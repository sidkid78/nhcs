<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #050510;
    overflow: hidden;
  }

  #c {
    width: 100%;
    height: 560px;
    position: relative;
  }

  canvas.three {
    position: absolute;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
  }

  .lbl {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -100%);
    text-align: center;
    transition: opacity .3s;
  }

  .lbl-name {
    font: 800 13px/1 -apple-system, sans-serif;
    letter-spacing: .06em;
    text-shadow: 0 0 14px currentColor;
  }

  .lbl-sub {
    font: 600 10px/1.4 -apple-system, sans-serif;
    opacity: .65;
    margin-top: 3px;
  }

  #ll1 {
    color: #c4b5fd;
  }

  #ll2 {
    color: #6ee7b7;
  }

  #ll3 {
    color: #fcd34d;
  }

  .leg {
    position: absolute;
    bottom: 12px;
    left: 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    pointer-events: none;
  }

  .li {
    display: flex;
    align-items: center;
    gap: 7px;
    font: 600 10px -apple-system, sans-serif;
    color: rgba(255, 255, 255, .5);
  }

  .ld {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  /* info panel */
  #info {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 25, .88);
    border: 1px solid rgba(255, 255, 255, .12);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 260px;
    max-width: 340px;
    display: none;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }

  #info-title {
    font: 800 12px -apple-system, sans-serif;
    margin-bottom: 6px;
  }

  #info-rows {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .irow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font: 500 10px -apple-system, sans-serif;
    color: rgba(255, 255, 255, .65);
  }

  .ival {
    font-weight: 700;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
  }

  /* CLI gauge */
  #gauge {
    position: absolute;
    bottom: 10px;
    right: 12px;
    width: 130px;
    height: 75px;
  }

  #gcv {
    width: 100%;
    height: 100%;
  }

  #ghint {
    position: absolute;
    bottom: 2px;
    left: 0;
    right: 0;
    text-align: center;
    font: 700 9px -apple-system, sans-serif;
    letter-spacing: .06em;
  }

  /* click hint */
  #hint {
    position: absolute;
    top: 10px;
    right: 12px;
    font: 600 9px -apple-system, sans-serif;
    color: rgba(255, 255, 255, .35);
    pointer-events: none;
  }
</style>
<div id="c">
  <div id="hint">Click a layer to inspect</div>
  <div id="ll1" class="lbl">
    <div class="lbl-name">Layer 1</div>
    <div class="lbl-sub">Genesis Core</div>
  </div>
  <div id="ll2" class="lbl">
    <div class="lbl-name">Layer 2</div>
    <div class="lbl-sub">TMFT · Hopfion</div>
  </div>
  <div id="ll3" class="lbl">
    <div class="lbl-name">Layer 3</div>
    <div class="lbl-sub">CRIM · Biometrics</div>
  </div>
  <div class="leg">
    <div class="li">
      <div class="ld" style="background:#8b5cf6"></div>ConceptTarget (L1→L2)
    </div>
    <div class="li">
      <div class="ld" style="background:#10b981"></div>PhysicalRealization (L2→L3)
    </div>
    <div class="li">
      <div class="ld" style="background:#f59e0b"></div>IntegrationFeedback (L3→L1)
    </div>
    <div class="li">
      <div class="ld" style="background:#94a3b8"></div>RetargetRequest (L3→L2)
    </div>
  </div>
  <div id="info">
    <div id="info-title"></div>
    <div id="info-rows"></div>
  </div>
  <div id="gauge">
    <canvas id="gcv"></canvas>
    <div id="ghint"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const cont = document.getElementById('c');
  let W = cont.offsetWidth, H = cont.offsetHeight;
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H); renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.domElement.className = 'three'; cont.insertBefore(renderer.domElement, cont.firstChild);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050510);
  scene.fog = new THREE.FogExp2(0x050510, .018);
  const camera = new THREE.PerspectiveCamera(52, W / H, .1, 300);
  camera.position.set(0, 7, 30); camera.lookAt(0, 0, 0);

  const P1 = new THREE.Vector3(-10, 3, 0), P2 = new THREE.Vector3(0, 0, 0), P3 = new THREE.Vector3(10, -3, 0);
  const C1 = 0x8b5cf6, C2 = 0x10b981, C3 = 0xf59e0b;

  // stars
  {
    const n = 1200, p = new Float32Array(n * 3); for (let i = 0; i < n * 3; i++)p[i] = (Math.random() - .5) * 160;
    const g = new THREE.BufferGeometry(); g.setAttribute('position', new THREE.BufferAttribute(p, 3));
    scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffffff, size: .06, transparent: true, opacity: .5 })));
  }

  scene.add(new THREE.AmbientLight(0x1a1a33, .8));
  const ptLights = [];
  [[C1, P1], [C2, P2], [C3, P3]].forEach(([c, p]) => { const l = new THREE.PointLight(c, 3, 22); l.position.copy(p); scene.add(l); ptLights.push(l); });

  function addDisc(g, r, col) {
    const m = new THREE.Mesh(new THREE.CircleGeometry(r, 48), new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: .06, side: THREE.DoubleSide, depthWrite: false }));
    m.rotation.x = Math.PI / 2; g.add(m);
    const t = new THREE.Mesh(new THREE.TorusGeometry(r, .025, 4, 64), new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: .25 }));
    t.rotation.x = Math.PI / 2; g.add(t);
  }

  // ── L1 ────────────────────────────────────────────────────────────────────────
  const g1 = new THREE.Group(); g1.position.copy(P1); scene.add(g1); addDisc(g1, 3, C1);
  const nodePos = [], nodeMesh = [];
  const nGeo = new THREE.SphereGeometry(.2, 10, 10);
  for (let i = 0; i < 16; i++) {
    const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1), r = .6 + Math.random() * 2.2;
    const p = new THREE.Vector3(r * Math.sin(ph) * Math.cos(th), r * Math.sin(ph) * Math.sin(th) * .75, r * Math.cos(ph));
    nodePos.push(p);
    const mat = new THREE.MeshStandardMaterial({ color: C1, emissive: C1, emissiveIntensity: .6, roughness: .2, metalness: .7 });
    const m = new THREE.Mesh(nGeo, mat); m.position.copy(p); m.userData = { bp: p.clone(), phase: Math.random() * Math.PI * 2 }; nodeMesh.push(m); g1.add(m);
  }
  const ep = [];
  for (let i = 0; i < nodePos.length; i++)for (let j = i + 1; j < nodePos.length; j++)
    if (nodePos[i].distanceTo(nodePos[j]) < 2.8 && Math.random() > .35) ep.push(...nodePos[i].toArray(), ...nodePos[j].toArray());
  const eGeo = new THREE.BufferGeometry(); eGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ep), 3));
  g1.add(new THREE.LineSegments(eGeo, new THREE.LineBasicMaterial({ color: C1, transparent: true, opacity: .22 })));
  const halo1 = new THREE.Mesh(new THREE.TorusGeometry(2.8, .015, 4, 80), new THREE.MeshBasicMaterial({ color: C1, transparent: true, opacity: .35 }));
  halo1.rotation.x = .4; g1.add(halo1);

  // ── L2 ────────────────────────────────────────────────────────────────────────
  const g2 = new THREE.Group(); g2.position.copy(P2); scene.add(g2); addDisc(g2, 4, C2);
  const tkGeo = new THREE.TorusKnotGeometry(2, .38, 120, 18, 2, 3);
  const tkMat = new THREE.MeshStandardMaterial({ color: C2, emissive: C2, emissiveIntensity: .35, roughness: .15, metalness: .9 });
  const tk = new THREE.Mesh(tkGeo, tkMat); g2.add(tk);
  g2.add(new THREE.Mesh(tkGeo, new THREE.MeshBasicMaterial({ color: C2, wireframe: true, transparent: true, opacity: .12 })));
  g2.add(new THREE.Mesh(new THREE.SphereGeometry(3.4, 20, 14), new THREE.MeshBasicMaterial({ color: 0x60a5fa, wireframe: true, transparent: true, opacity: .07 })));
  for (let i = 0; i < 6; i++) { const fr = new THREE.Mesh(new THREE.TorusGeometry(2.6 + i * .15, .018, 4, 50), new THREE.MeshBasicMaterial({ color: C2, transparent: true, opacity: .18 - i * .02 })); fr.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI); g2.add(fr); }

  // ── L3 ────────────────────────────────────────────────────────────────────────
  const g3 = new THREE.Group(); g3.position.copy(P3); scene.add(g3); addDisc(g3, 3, C3);
  g3.add(new THREE.Mesh(new THREE.SphereGeometry(1.6, 28, 28), new THREE.MeshStandardMaterial({ color: C3, emissive: C3, emissiveIntensity: .25, roughness: .4, metalness: .3, transparent: true, opacity: .72 })));
  g3.add(new THREE.Mesh(new THREE.SphereGeometry(1.66, 18, 14), new THREE.MeshBasicMaterial({ color: C3, wireframe: true, transparent: true, opacity: .22 })));
  const rings = [];
  for (let i = 0; i < 3; i++) { const rm = new THREE.Mesh(new THREE.TorusGeometry(1, .03, 4, 50), new THREE.MeshBasicMaterial({ color: C3, transparent: true, opacity: .55 })); rm.rotation.x = Math.PI / 2; rm.userData.ph = (i / 3) * Math.PI * 2; g3.add(rm); rings.push(rm); }

  // ── hit spheres (invisible, for raycasting) ───────────────────────────────────
  const hitSpheres = [];
  [[g1, P1, C1, 'l1'], [g2, P2, C2, 'l2'], [g3, P3, C3, 'l3']].forEach(([grp, pos, col, id]) => {
    const hs = new THREE.Mesh(new THREE.SphereGeometry(3.5, 8, 8), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false }));
    hs.position.copy(pos); hs.userData = { id, grp, col }; scene.add(hs); hitSpheres.push(hs);
  });

  // ── bus particles ─────────────────────────────────────────────────────────────
  function bez(p0, p1, p2, p3, t) { const u = 1 - t; return new THREE.Vector3(u * u * u * p0.x + 3 * u * u * t * p1.x + 3 * u * t * t * p2.x + t * t * t * p3.x, u * u * u * p0.y + 3 * u * u * t * p1.y + 3 * u * t * t * p2.y + t * t * t * p3.y, u * u * u * p0.z + 3 * u * u * t * p1.z + 3 * u * t * t * p2.z + t * t * t * p3.z); }
  const channels = [
    { f: P1, t: P2, c: C1, c1: new THREE.Vector3(-4, 10, 4), c2: new THREE.Vector3(4, 6, 4), spd: .0035 },
    { f: P2, t: P3, c: C2, c1: new THREE.Vector3(4, 3, 4), c2: new THREE.Vector3(7, 1, 4), spd: .0032 },
    { f: P3, t: P1, c: C3, c1: new THREE.Vector3(5, -10, -4), c2: new THREE.Vector3(-5, -6, -4), spd: .003 },
    { f: P3, t: P2, c: 0x94a3b8, c1: new THREE.Vector3(7, -1, -3), c2: new THREE.Vector3(3, -1, -3), spd: .004 },
  ];
  const parts = [];
  const pGeo = new THREE.SphereGeometry(.13, 4, 4);
  channels.forEach(ch => {
    for (let i = 0; i < 14; i++) { const mat = new THREE.MeshBasicMaterial({ color: ch.c, transparent: true, opacity: .95 }); const m = new THREE.Mesh(pGeo, mat); parts.push({ m, ch, t: Math.random(), spd: ch.spd * (1 + Math.random() * .4) }); scene.add(m); }
    const pts = []; for (let i = 0; i <= 40; i++)pts.push(bez(ch.f, ch.c1, ch.c2, ch.t, i / 40));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: ch.c, transparent: true, opacity: .06 })));
  });

  // ── labels ────────────────────────────────────────────────────────────────────
  const lblData = [
    { el: document.getElementById('ll1'), wp: P1.clone().add(new THREE.Vector3(0, 4.5, 0)) },
    { el: document.getElementById('ll2'), wp: P2.clone().add(new THREE.Vector3(0, 5, 0)) },
    { el: document.getElementById('ll3'), wp: P3.clone().add(new THREE.Vector3(0, 3.5, 0)) },
  ];
  function updateLabels() { lblData.forEach(({ el, wp }) => { const v = wp.clone().project(camera); el.style.left = ((v.x * .5 + .5) * W) + 'px'; el.style.top = ((-v.y * .5 + .5) * H) + 'px'; }); }

  // ── click & info panel ────────────────────────────────────────────────────────
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;
  const infoData = {
    l1: {
      title: 'Layer 1 — Genesis Core', color: '#c4b5fd', rows: [
        ['RSE mode', 'Attractor search'], ['AIAN novelty', '0.73'], ['Betti profile', '[1, 2, 1]'],
        ['Eₜ score', '0.91 ✓'], ['Aₚ score', '0.74 ✓'], ['ICVP status', 'Awaiting vote 3/5'],
      ]
    },
    l2: {
      title: 'Layer 2 — TMFT · Hopfion', color: '#6ee7b7', rows: [
        ['Torus knot', 'p=2, q=3'], ['Frequency', '27.4 Hz ✓ stable'], ['Wavelength', '505 nm (cyan)'],
        ['Hopf charge err', '2.1%'], ['B-field', '28.3 mT'], ['Solver', 'LLG converged 847ms'],
      ]
    },
    l3: {
      title: 'Layer 3 — CRIM · Biometrics', color: '#fcd34d', rows: [
        ['CLI', '0.58 → Flow State'], ['IIS', '0.71'], ['BHI', '0.84'],
        ['SDR', '0.63 ± 0.04'], ['Subject', 'Synthetic (McSharry)'], ['Airlock', 'Open — pacing +12%'],
      ]
    },
  };
  function showInfo(id) {
    const d = infoData[id], panel = document.getElementById('info');
    document.getElementById('info-title').style.color = d.color;
    document.getElementById('info-title').textContent = d.title;
    document.getElementById('info-rows').innerHTML = d.rows.map(([k, v]) => `<div class="irow"><span>${k}</span><span class="ival" style="background:${d.color}22;color:${d.color}">${v}</span></div>`).join('');
    panel.style.display = 'block';
    panel.style.borderColor = d.color + '44';
  }
  function hideInfo() { document.getElementById('info').style.display = 'none'; }

  renderer.domElement.addEventListener('click', e => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(hitSpheres);
    if (hits.length) {
      const id = hits[0].object.userData.id;
      if (selected === id) { selected = null; hideInfo(); }
      else { selected = id; showInfo(id); }
    } else { selected = null; hideInfo(); }
  });

  // ── CLI gauge ─────────────────────────────────────────────────────────────────
  const gcv = document.getElementById('gcv');
  const gctx = gcv.getContext('2d');
  gcv.width = 130; gcv.height = 75;
  let cliVal = .6, cliTarget = .6, cliNoise = 0;

  function drawGauge(cli) {
    const gW = gcv.width, gH = gcv.height;
    gctx.clearRect(0, 0, gW, gH);
    const cx = gW / 2, cy = gH - 8, r = 50;
    // track
    gctx.beginPath(); gctx.arc(cx, cy, r, Math.PI, 0);
    gctx.lineWidth = 7; gctx.strokeStyle = 'rgba(255,255,255,.1)'; gctx.stroke();
    // color zones
    const zones = [[0, .3, '#ef4444'], [.3, .5, '#f59e0b'], [.5, .7, '#22c55e'], [.7, .85, '#f59e0b'], [.85, 1, '#ef4444']];
    zones.forEach(([s, e, col]) => {
      gctx.beginPath(); gctx.arc(cx, cy, r, Math.PI + s * Math.PI, Math.PI + e * Math.PI);
      gctx.strokeStyle = col + '88'; gctx.lineWidth = 7; gctx.stroke();
    });
    // value arc
    gctx.beginPath(); gctx.arc(cx, cy, r, Math.PI, Math.PI + cli * Math.PI);
    const grad = gctx.createLinearGradient(cx - r, cy, cx + r, cy);
    grad.addColorStop(0, '#ef4444'); grad.addColorStop(.5, '#22c55e'); grad.addColorStop(1, '#ef4444');
    gctx.strokeStyle = grad; gctx.lineWidth = 7; gctx.stroke();
    // needle
    const ang = Math.PI + cli * Math.PI;
    const nx = cx + Math.cos(ang) * (r - 4), ny = cy + Math.sin(ang) * (r - 4);
    gctx.beginPath(); gctx.moveTo(cx, cy); gctx.lineTo(nx, ny);
    gctx.strokeStyle = 'white'; gctx.lineWidth = 2; gctx.stroke();
    gctx.beginPath(); gctx.arc(cx, cy, 4, 0, Math.PI * 2); gctx.fillStyle = 'white'; gctx.fill();
    // value text
    gctx.fillStyle = 'rgba(255,255,255,.9)'; gctx.font = 'bold 11px -apple-system,sans-serif';
    gctx.textAlign = 'center'; gctx.fillText('CLI  ' + cli.toFixed(2), cx, cy - 18);
    // state
    const state = cli < .35 ? 'OVERLOAD' : cli < .5 ? 'HIGH' : cli < .7 ? 'FLOW' : cli < .85 ? 'HIGH' : 'OVERLOAD';
    const sc = cli < .35 || cli > .85 ? '#ef4444' : cli < .5 || cli > .7 ? '#f59e0b' : '#22c55e';
    const gh = document.getElementById('ghint'); gh.textContent = state; gh.style.color = sc;
  }

  // ── main loop ─────────────────────────────────────────────────────────────────
  let tt = 0, camA = 0;
  (function loop() {
    requestAnimationFrame(loop);
    tt += .01; camA += .0025;

    camera.position.set(Math.sin(camA) * 28 * .6, 5 + Math.sin(camA * .4) * 4, Math.cos(camA) * 28);
    camera.lookAt(0, 0, 0);

    // L1 nodes
    nodeMesh.forEach(n => { const ph = n.userData.phase; n.position.x = n.userData.bp.x + Math.sin(tt + ph) * .12; n.position.y = n.userData.bp.y + Math.cos(tt * .8 + ph) * .12; n.material.emissiveIntensity = .45 + .4 * Math.sin(tt * 2.2 + ph); });
    g1.rotation.y = tt * .09; halo1.rotation.z = tt * .05;
    // L2
    tk.rotation.y = tt * .45; tk.rotation.x = tt * .18;
    // L3 rings
    rings.forEach(r => { const p = ((tt * .5 + r.userData.ph / (Math.PI * 2)) % 1); const sc = 1 + p * 3; r.scale.set(sc, 1, sc); r.material.opacity = .55 * (1 - p); });
    // particles
    parts.forEach(p => { p.t = (p.t + p.spd) % 1; p.m.position.copy(bez(p.ch.f, p.ch.c1, p.ch.c2, p.ch.t, p.t)); const e = Math.min(p.t, 1 - p.t) * 8; p.m.material.opacity = Math.min(e, .9); });

    // selection highlight
    [[g1, 'l1', C1], [g2, 'l2', C2], [g3, 'l3', C3]].forEach(([grp, id, col]) => {
      const active = selected === id;
      const base = active ? 1.2 : .5 + .2 * Math.sin(tt);
      grp.traverse(o => { if (o.material && o.material.emissive) o.material.emissiveIntensity = base; });
      const li = [[g1, 0], [g2, 1], [g3, 2]].find(x => x[0] === grp)[1];
      ptLights[li].intensity = active ? 6 : 3;
    });

    // CLI simulation
    cliNoise += .008;
    cliTarget = .6 + .12 * Math.sin(cliNoise * 1.3) + .06 * Math.sin(cliNoise * 2.7) + .04 * Math.sin(cliNoise * .5);
    cliVal += (cliTarget - cliVal) * .04;
    drawGauge(Math.max(0, Math.min(1, cliVal)));

    updateLabels();
    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', () => { W = cont.offsetWidth; H = cont.offsetHeight; camera.aspect = W / H; camera.updateProjectionMatrix(); renderer.setSize(W, H); });
</script>
